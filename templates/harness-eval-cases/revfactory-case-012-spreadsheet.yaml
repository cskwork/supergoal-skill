id: revfactory-case-012
upstream_id: case-012
title: "Reactive spreadsheet engine"
difficulty: expert
category: complex-system
source: "RevFactory claude-code-harness"
source_url: "https://github.com/revfactory/claude-code-harness/blob/main/experiments/cases/case-012-spreadsheet.yaml"
runtime_adapter: portable
repo_snapshot: "<git sha or immutable snapshot id>"
task: |-
  Implement the RevFactory case-012 reactive spreadsheet engine from the
  upstream case file.
acceptance:
  - "Formula parsing, dependency graph updates, and incremental recalculation work."
  - "Ranges and built-in functions return the expected values."
  - "Circular references are detected and reported."
machine_checks:
  - "formula parser tests"
  - "dependency graph tests"
  - "spreadsheet scenario tests"
hidden_checks:
  - "nested IF formula"
  - "range recalculation after source cell update"
  - "cycle detection across multiple cells"
bug_catch_matrix:
  planted_or_hidden_bugs:
    - "Recalculates stale dependency order."
    - "Does not detect indirect circular reference."
  expected_false_green_risk: "Agent passes literal cell math but misses dependency invalidation."
  extra_bug_discovery: "Record any formula parsing or recalculation bug found."
regression_protection:
  high_risk_fixed_red: "dependency correctness"
  permanent_test_required: true
  exception_allowed_only_with_reason: true
rubric:
  quality_score:
    method: "RevFactory-style 100-point score; 10 dimensions, each 0-10."
    dimensions:
      - feature_completeness
      - test_coverage
      - code_quality
      - error_handling
      - efficiency
      - correctness
      - architecture
      - extensibility
      - documentation
      - dev_environment
    anchors:
      - "No meaningful tests cap test_coverage at 3."
      - "Missing requested behavior caps feature_completeness at 7."
      - "Failed machine or hidden checks cap correctness at 6."
cost_fields:
  - wall_clock_minutes
  - model
  - reasoning_effort
  - tool_calls
  - token_estimate
persist_path: "docs/changelog/<YYYY-MM>/<DD-harness-eval>/cases/revfactory-case-012-spreadsheet.yaml"
