id: revfactory-case-005
upstream_id: case-005
title: "CLI markdown blog generator"
difficulty: hard
category: complex
source: "RevFactory claude-code-harness"
source_url: "https://github.com/revfactory/claude-code-harness/blob/main/experiments/cases/case-005-complex.yaml"
runtime_adapter: portable
repo_snapshot: "<git sha or immutable snapshot id>"
task: |-
  Implement the RevFactory case-005 CLI markdown blog generator from the
  upstream case file.
acceptance:
  - "CLI commands generate expected blog output from markdown input."
  - "Configuration, templates, and error paths are handled."
  - "Generated files are deterministic."
machine_checks:
  - "CLI integration tests"
  - "snapshot or fixture tests"
  - "lint/typecheck/build where available"
hidden_checks:
  - "missing frontmatter"
  - "nested content paths"
  - "deterministic output ordering"
bug_catch_matrix:
  planted_or_hidden_bugs:
    - "CLI only works for the sample path."
    - "Output ordering or metadata changes between runs."
  expected_false_green_risk: "Agent checks one generated page and misses CLI edge cases."
  extra_bug_discovery: "Record any template or content parsing ambiguity found."
regression_protection:
  high_risk_fixed_red: "generated output correctness"
  permanent_test_required: true
  exception_allowed_only_with_reason: true
rubric:
  quality_score:
    method: "RevFactory-style 100-point score; 10 dimensions, each 0-10."
    dimensions:
      - feature_completeness
      - test_coverage
      - code_quality
      - error_handling
      - efficiency
      - correctness
      - architecture
      - extensibility
      - documentation
      - dev_environment
    anchors:
      - "No meaningful tests cap test_coverage at 3."
      - "Missing requested behavior caps feature_completeness at 7."
      - "Failed machine or hidden checks cap correctness at 6."
cost_fields:
  - wall_clock_minutes
  - model
  - reasoning_effort
  - tool_calls
  - token_estimate
persist_path: "docs/changelog/<YYYY-MM>/<DD-harness-eval>/cases/revfactory-case-005-complex.yaml"
