id: revfactory-case-010
upstream_id: case-010
title: "CRDT collaborative editor"
difficulty: expert
category: complex-system
source: "RevFactory claude-code-harness"
source_url: "https://github.com/revfactory/claude-code-harness/blob/main/experiments/cases/case-010-crdt.yaml"
runtime_adapter: portable
repo_snapshot: "<git sha or immutable snapshot id>"
task: |-
  Implement the RevFactory case-010 CRDT collaborative editor from the upstream
  case file.
acceptance:
  - "Concurrent edits converge without central ordering."
  - "Insert, delete, merge, and remote operation handling are implemented."
  - "Tests prove convergence and idempotency."
machine_checks:
  - "CRDT unit tests"
  - "concurrent edit scenario tests"
  - "lint/typecheck/build where available"
hidden_checks:
  - "same-position concurrent inserts"
  - "delete after remote insert"
  - "duplicate remote operation"
bug_catch_matrix:
  planted_or_hidden_bugs:
    - "Last-write-wins behavior loses concurrent edits."
    - "Merge is not commutative or idempotent."
  expected_false_green_risk: "Agent proves sequential edits only."
  extra_bug_discovery: "Record any convergence or tombstone bug found."
regression_protection:
  high_risk_fixed_red: "collaboration correctness"
  permanent_test_required: true
  exception_allowed_only_with_reason: true
rubric:
  quality_score:
    method: "RevFactory-style 100-point score; 10 dimensions, each 0-10."
    dimensions:
      - feature_completeness
      - test_coverage
      - code_quality
      - error_handling
      - efficiency
      - correctness
      - architecture
      - extensibility
      - documentation
      - dev_environment
    anchors:
      - "No meaningful tests cap test_coverage at 3."
      - "Missing requested behavior caps feature_completeness at 7."
      - "Failed machine or hidden checks cap correctness at 6."
cost_fields:
  - wall_clock_minutes
  - model
  - reasoning_effort
  - tool_calls
  - token_estimate
persist_path: "docs/changelog/<YYYY-MM>/<DD-harness-eval>/cases/revfactory-case-010-crdt.yaml"
