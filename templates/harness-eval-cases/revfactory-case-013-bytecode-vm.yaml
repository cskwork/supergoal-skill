id: revfactory-case-013
upstream_id: case-013
title: "Virtual machine and bytecode compiler"
difficulty: expert
category: complex-system
source: "RevFactory claude-code-harness"
source_url: "https://github.com/revfactory/claude-code-harness/blob/main/experiments/cases/case-013-bytecode-vm.yaml"
runtime_adapter: portable
repo_snapshot: "<git sha or immutable snapshot id>"
task: |-
  Implement the RevFactory case-013 MiniLang bytecode compiler and stack-based
  virtual machine from the upstream case file.
acceptance:
  - "Compiler emits correct bytecode for the required language constructs."
  - "VM executes functions, closures, recursion, arrays, and control flow."
  - "Disassembler and error paths are covered."
machine_checks:
  - "compiler bytecode tests"
  - "VM opcode tests"
  - "end-to-end MiniLang scenario tests"
hidden_checks:
  - "closure captures local variable"
  - "recursive function call"
  - "stack underflow or invalid opcode error"
bug_catch_matrix:
  planted_or_hidden_bugs:
    - "Compiler emits bytecode that only works for straight-line code."
    - "Call frames or closures leak state."
  expected_false_green_risk: "Agent implements interpreter behavior without a real compiler/VM split."
  extra_bug_discovery: "Record any opcode, call-frame, or disassembly bug found."
regression_protection:
  high_risk_fixed_red: "runtime semantics"
  permanent_test_required: true
  exception_allowed_only_with_reason: true
rubric:
  quality_score:
    method: "RevFactory-style 100-point score; 10 dimensions, each 0-10."
    dimensions:
      - feature_completeness
      - test_coverage
      - code_quality
      - error_handling
      - efficiency
      - correctness
      - architecture
      - extensibility
      - documentation
      - dev_environment
    anchors:
      - "No meaningful tests cap test_coverage at 3."
      - "Missing requested behavior caps feature_completeness at 7."
      - "Failed machine or hidden checks cap correctness at 6."
cost_fields:
  - wall_clock_minutes
  - model
  - reasoning_effort
  - tool_calls
  - token_estimate
persist_path: "docs/changelog/<YYYY-MM>/<DD-harness-eval>/cases/revfactory-case-013-bytecode-vm.yaml"
