id: case-001
title: "Short task title"
difficulty: simple
runtime_adapter: portable
repo_snapshot: "<git sha or immutable snapshot id>"
task: |
  Exact task text. Reuse this text unchanged for baseline and harness runs.
acceptance:
  - "Machine-checkable expectation"
  - "Human-review expectation"
machine_checks:
  - test
  - lint
  - build
bug_catch_matrix:
  planted_or_hidden_bugs:
    - "Bug or hidden check the run must catch before shipping"
  expected_false_green_risk: "What would count as ship/green while still wrong?"
  extra_bug_discovery: "How to record genuine bugs found outside the planted set"
regression_protection:
  high_risk_fixed_red: "none, or security/data/concurrency/auth class"
  permanent_test_required: true
  exception_allowed_only_with_reason: true
rubric:
  correctness: "Does the result meet the task without known bugs?"
  tests: "Are relevant regression or acceptance tests present?"
  architecture: "Is the structure appropriate for the task size?"
  maintainability: "Can a future agent or engineer extend it safely?"
  efficiency: "Was overhead justified by quality?"
