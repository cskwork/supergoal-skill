id: revfactory-case-004
upstream_id: case-004
title: "Open-source project documentation"
difficulty: easy
category: documentation
source: "RevFactory claude-code-harness"
source_url: "https://github.com/revfactory/claude-code-harness/blob/main/experiments/cases/case-004-documentation.yaml"
runtime_adapter: portable
repo_snapshot: "<git sha or immutable snapshot id>"
task: |-
  Complete the RevFactory case-004 open-source documentation task from the
  upstream case file.
acceptance:
  - "Documentation covers install, quick start, usage, and contribution basics."
  - "Examples are executable or clearly marked as illustrative."
  - "No unsupported claims are added."
machine_checks:
  - "documentation link or markdown checks"
  - "example command smoke checks where feasible"
  - "spell/style check where available"
hidden_checks:
  - "missing prerequisite or setup step"
  - "broken command copied from docs"
  - "unsupported feature claim"
bug_catch_matrix:
  planted_or_hidden_bugs:
    - "Docs claim behavior that code does not support."
    - "Quick-start omits required setup."
  expected_false_green_risk: "Agent submits polished prose without runnable examples."
  extra_bug_discovery: "Record any stale or inaccurate existing docs discovered."
regression_protection:
  high_risk_fixed_red: "documentation accuracy"
  permanent_test_required: true
  exception_allowed_only_with_reason: true
rubric:
  quality_score:
    method: "RevFactory-style 100-point score; 10 dimensions, each 0-10."
    dimensions:
      - feature_completeness
      - test_coverage
      - code_quality
      - error_handling
      - efficiency
      - correctness
      - architecture
      - extensibility
      - documentation
      - dev_environment
    anchors:
      - "No meaningful tests cap test_coverage at 3."
      - "Missing requested behavior caps feature_completeness at 7."
      - "Failed machine or hidden checks cap correctness at 6."
cost_fields:
  - wall_clock_minutes
  - model
  - reasoning_effort
  - tool_calls
  - token_estimate
persist_path: "docs/changelog/<YYYY-MM>/<DD-harness-eval>/cases/revfactory-case-004-documentation.yaml"
