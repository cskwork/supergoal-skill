id: hard-safe-redirect
title: "Harden redirect URL validation"
difficulty: hard
runtime_adapter: codex-exec
task: >-
  Harden isSafeRedirect(rawUrl, allowedHosts). It must allow only http and https URLs whose hostname is exactly an allowed host or a subdomain of an allowed host. Reject userinfo, backslashes, control characters, localhost with or without a trailing dot, private IPv4 ranges including hex/octal/integer forms normalized by URL, IPv6 loopback, IPv6 unique-local addresses, IPv4-mapped loopback/private IPv6 forms, and host suffix bypasses like example.com.evil.test.
machine_checks:
  - unit tests
  - source syntax
  - test syntax
