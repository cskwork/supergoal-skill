id: case-001
title: "Short task title"
difficulty: simple
case_type: coding # coding | routing
source: "<pilot, rerun, upstream URL, or repo-specific>"
runtime_adapter: portable
repo_snapshot: "<git sha or immutable snapshot id>"
default_coding_ab:
  applies_when: "coding harness eval requested without named cases"
  cases:
    - fixture: "revfactory-case-002-async-race/"
      spec: "revfactory-case-002-bug-fix.yaml"
      mode: "DEBUG/concurrency"
      reason: "hard runnable fixture with visible-pass hidden-fail starter"
    - fixture: "revfactory-case-003-refactoring/"
      spec: "revfactory-case-003-refactoring.yaml"
      mode: "LEGACY/brownfield preservation"
      reason: "runnable preservation fixture whose hidden suite catches behavior drift"
  excluded_from_default:
    - "underspec-001-deepmerge/"
    - "underspec-002-csvline/"
  tie_rule: "If both default cases tie, report Not proven and require authored expert runnable fixtures."
task: |
  Exact task text. Reuse this text unchanged for baseline and harness runs.
eval_intent:
  goal: "User objective in their own terms, not a diff summary."
  constraints:
    - "Constraint learned from the conversation or repo rules."
  tradeoffs:
    - "Decision that affects review judgment."
  rejected_approaches:
    - "Alternative considered and rejected."
acceptance:
  - "Machine-checkable expectation"
  - "Human-review expectation"
routing_probe:
  applies: false
  train_test_split: "60/40"
  trials_per_prompt: 3
  prompts:
    - id: route-001
      split: train
      expected: should_trigger
      text: "/supergoal fix the failing checkout test"
    - id: route-002
      split: heldout
      expected: should_not_trigger
      text: "Rewrite this sentence more politely"
machine_checks:
  - test
  - lint
  - build
command_manifest:
  - name: test
    command: "npm test"
    source: frozen_repo
    used_by: both
    verifies: "visible and hidden acceptance tests"
hidden_checks:
  - "Hidden or evaluator-only check the run must pass"
bug_catch_matrix:
  planted_or_hidden_bugs:
    - "Bug or hidden check the run must catch before shipping"
  expected_false_green_risk: "What would count as ship/green while still wrong?"
  extra_bug_discovery: "How to record genuine bugs found outside the planted set"
regression_protection:
  high_risk_fixed_red: "none, or security/data/concurrency/auth class"
  permanent_test_required: true
  exception_allowed_only_with_reason: true
decision_gates:
  - id: r1
    action: auto-fix
    status: resolved
    description: "Mechanical finding surfaced by the gate."
    recheck: "Command proving the fix."
adapter_fixture_replay:
  status: not_required
  adapter_event_schema: "portable-result-json-v1"
  fixtures: []
  redaction: "not required"
  replay_command: "not required"
rubric:
  quality_score: "RevFactory-style 100-point score across 10 dimensions, each 0-10."
  correctness: "Does the result meet the task without known bugs?"
  tests: "Are relevant regression or acceptance tests present?"
  architecture: "Is the structure appropriate for the task size?"
  maintainability: "Can a future agent or engineer extend it safely?"
  efficiency: "Was overhead justified by quality?"
cost_fields:
  - wall_clock_minutes
  - duration_ms
  - model
  - reasoning_effort
  - tool_calls
  - total_tokens
  - token_estimate
persist_path: "docs/changelog/<YYYY-MM>/<DD-harness-eval>/cases/<id>.yaml or .domain-agent/qa/harness-eval/<id>.yaml"
