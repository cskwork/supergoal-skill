id: revfactory-case-011
upstream_id: case-011
title: "Distributed key-value store with Raft consensus"
difficulty: expert
category: complex-system
source: "RevFactory claude-code-harness"
source_url: "https://github.com/revfactory/claude-code-harness/blob/main/experiments/cases/case-011-raft-kv.yaml"
runtime_adapter: portable
repo_snapshot: "<git sha or immutable snapshot id>"
task: |-
  Implement the RevFactory case-011 Raft-based distributed key-value store
  from the upstream case file.
acceptance:
  - "Leader election, log replication, and commit behavior work."
  - "KV operations route through the leader and converge after partitions heal."
  - "The five upstream core scenarios pass."
machine_checks:
  - "Raft node unit tests"
  - "cluster partition/recovery tests"
  - "KV consistency scenario tests"
hidden_checks:
  - "minority partition cannot commit writes"
  - "old leader steps down after healing"
  - "CAS remains atomic under concurrent writes"
bug_catch_matrix:
  planted_or_hidden_bugs:
    - "Multiple leaders in the same term."
    - "Committed logs diverge after partition recovery."
  expected_false_green_risk: "Agent implements a KV store without real Raft safety."
  extra_bug_discovery: "Record any election, replication, or convergence bug found."
regression_protection:
  high_risk_fixed_red: "distributed consistency"
  permanent_test_required: true
  exception_allowed_only_with_reason: true
rubric:
  quality_score:
    method: "RevFactory-style 100-point score; 10 dimensions, each 0-10."
    dimensions:
      - feature_completeness
      - test_coverage
      - code_quality
      - error_handling
      - efficiency
      - correctness
      - architecture
      - extensibility
      - documentation
      - dev_environment
    anchors:
      - "No meaningful tests cap test_coverage at 3."
      - "Missing requested behavior caps feature_completeness at 7."
      - "Failed machine or hidden checks cap correctness at 6."
cost_fields:
  - wall_clock_minutes
  - model
  - reasoning_effort
  - tool_calls
  - token_estimate
persist_path: "docs/changelog/<YYYY-MM>/<DD-harness-eval>/cases/revfactory-case-011-raft-kv.yaml"
