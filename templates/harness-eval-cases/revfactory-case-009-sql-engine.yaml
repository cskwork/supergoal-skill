id: revfactory-case-009
upstream_id: case-009
title: "SQL query engine"
difficulty: expert
category: complex-system
source: "RevFactory claude-code-harness"
source_url: "https://github.com/revfactory/claude-code-harness/blob/main/experiments/cases/case-009-sql-engine.yaml"
runtime_adapter: portable
repo_snapshot: "<git sha or immutable snapshot id>"
task: |-
  Implement the RevFactory case-009 SQL query engine from the upstream case
  file.
acceptance:
  - "Parser, planner, and executor handle the required SQL subset."
  - "Joins, filters, aggregation, and ordering match expected output."
  - "Invalid SQL reports useful errors."
machine_checks:
  - "parser tests"
  - "query execution fixture tests"
  - "lint/typecheck/build where available"
hidden_checks:
  - "join plus where predicate"
  - "aggregate with grouping"
  - "invalid SQL syntax"
bug_catch_matrix:
  planted_or_hidden_bugs:
    - "String-split parser fails nested or multi-clause queries."
    - "Executor applies clauses in the wrong order."
  expected_false_green_risk: "Agent passes SELECT * sample but misses joins or grouping."
  extra_bug_discovery: "Record any SQL semantic edge case found."
regression_protection:
  high_risk_fixed_red: "query correctness"
  permanent_test_required: true
  exception_allowed_only_with_reason: true
rubric:
  quality_score:
    method: "RevFactory-style 100-point score; 10 dimensions, each 0-10."
    dimensions:
      - feature_completeness
      - test_coverage
      - code_quality
      - error_handling
      - efficiency
      - correctness
      - architecture
      - extensibility
      - documentation
      - dev_environment
    anchors:
      - "No meaningful tests cap test_coverage at 3."
      - "Missing requested behavior caps feature_completeness at 7."
      - "Failed machine or hidden checks cap correctness at 6."
cost_fields:
  - wall_clock_minutes
  - model
  - reasoning_effort
  - tool_calls
  - token_estimate
persist_path: "docs/changelog/<YYYY-MM>/<DD-harness-eval>/cases/revfactory-case-009-sql-engine.yaml"
