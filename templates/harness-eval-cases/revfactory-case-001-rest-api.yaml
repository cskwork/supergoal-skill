id: revfactory-case-001
upstream_id: case-001
title: "REST API server implementation"
difficulty: medium
category: code-generation
source: "RevFactory claude-code-harness"
source_url: "https://github.com/revfactory/claude-code-harness/blob/main/experiments/cases/case-001-rest-api.yaml"
runtime_adapter: portable
repo_snapshot: "<git sha or immutable snapshot id>"
task: |-
  Implement the RevFactory case-001 REST API server task from the upstream
  case file. Keep the task wording identical for baseline and harness arms.
acceptance:
  - "Implements the REST API behavior required by the upstream case."
  - "Includes routing, validation, error handling, and tests."
machine_checks:
  - "unit tests"
  - "API or integration tests"
  - "lint/typecheck/build where available"
hidden_checks:
  - "invalid input returns the expected error"
  - "missing resource returns the expected status"
  - "successful CRUD path persists and returns expected data"
bug_catch_matrix:
  planted_or_hidden_bugs:
    - "Happy-path-only API with missing validation."
    - "Incorrect status code or response shape on error."
  expected_false_green_risk: "Agent claims API complete after manual happy-path smoke only."
  extra_bug_discovery: "Record any mismatch between route behavior and upstream acceptance text."
regression_protection:
  high_risk_fixed_red: "API behavior"
  permanent_test_required: true
  exception_allowed_only_with_reason: true
rubric:
  quality_score:
    method: "RevFactory-style 100-point score; 10 dimensions, each 0-10."
    dimensions:
      - feature_completeness
      - test_coverage
      - code_quality
      - error_handling
      - efficiency
      - correctness
      - architecture
      - extensibility
      - documentation
      - dev_environment
    anchors:
      - "No meaningful tests cap test_coverage at 3."
      - "Missing requested behavior caps feature_completeness at 7."
      - "Failed machine or hidden checks cap correctness at 6."
cost_fields:
  - wall_clock_minutes
  - model
  - reasoning_effort
  - tool_calls
  - token_estimate
persist_path: "docs/changelog/<YYYY-MM>/<DD-harness-eval>/cases/revfactory-case-001-rest-api.yaml"
