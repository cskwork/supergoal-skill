id: revfactory-case-014
upstream_id: case-014
title: "Event sourcing and CQRS framework"
difficulty: expert
category: complex-system
source: "RevFactory claude-code-harness"
source_url: "https://github.com/revfactory/claude-code-harness/blob/main/experiments/cases/case-014-event-sourcing.yaml"
runtime_adapter: portable
repo_snapshot: "<git sha or immutable snapshot id>"
task: |-
  Implement the RevFactory case-014 event sourcing and CQRS framework from
  the upstream case file.
acceptance:
  - "Event store, aggregates, command bus, projections, saga, and snapshots work."
  - "Banking-domain scenarios replay and project correctly."
  - "Compensation or failure scenarios behave as specified."
machine_checks:
  - "event store tests"
  - "aggregate replay tests"
  - "CQRS projection and saga tests"
hidden_checks:
  - "rebuild projection from event history"
  - "transfer compensation on failure"
  - "snapshot restore preserves aggregate state"
bug_catch_matrix:
  planted_or_hidden_bugs:
    - "Projection is treated as source of truth."
    - "Events are mutable or replay order is wrong."
  expected_false_green_risk: "Agent builds CRUD state store and calls it event sourcing."
  extra_bug_discovery: "Record any replay, projection, or saga consistency bug found."
regression_protection:
  high_risk_fixed_red: "financial/event consistency"
  permanent_test_required: true
  exception_allowed_only_with_reason: true
rubric:
  quality_score:
    method: "RevFactory-style 100-point score; 10 dimensions, each 0-10."
    dimensions:
      - feature_completeness
      - test_coverage
      - code_quality
      - error_handling
      - efficiency
      - correctness
      - architecture
      - extensibility
      - documentation
      - dev_environment
    anchors:
      - "No meaningful tests cap test_coverage at 3."
      - "Missing requested behavior caps feature_completeness at 7."
      - "Failed machine or hidden checks cap correctness at 6."
cost_fields:
  - wall_clock_minutes
  - model
  - reasoning_effort
  - tool_calls
  - token_estimate
persist_path: "docs/changelog/<YYYY-MM>/<DD-harness-eval>/cases/revfactory-case-014-event-sourcing.yaml"
